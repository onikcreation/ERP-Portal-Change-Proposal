<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal — ChangeProposal</title>
<style>
  :root { --indigo:#4338CA; --indigo-dark:#342AA0; --ink:#1F2430; --muted:#667085; --border:#E4E7EC; --bg:#F7F8FA; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Noto Sans Bengali",Arial,sans-serif; color:var(--ink); background:var(--bg); }
  header { background:linear-gradient(135deg,var(--indigo),var(--indigo-dark)); color:#fff; padding:26px 24px 30px; }
  .wrap { max-width:820px; margin:0 auto; }
  .breadcrumb { font-size:12.5px; opacity:.92; margin-bottom:8px; display:flex; align-items:center; flex-wrap:wrap; }
  .breadcrumb a { color:#fff; text-decoration:none; opacity:.82; }
  .breadcrumb a:hover { text-decoration:underline; opacity:1; }
  .breadcrumb .sep { margin:0 6px; opacity:.45; }
  .breadcrumb .current { opacity:1; font-weight:600; }
  header h1 { margin:0; font-size:21px; font-weight:700; }
  main { max-width:820px; margin:-18px auto 0; padding:0 24px 60px; }
  .list { background:#fff; border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(16,24,40,.05); }
  a.item { display:flex; align-items:center; gap:14px; padding:15px 18px; text-decoration:none; color:inherit; border-bottom:1px solid var(--border); transition:background .12s ease; }
  a.item:last-child { border-bottom:none; }
  a.item:hover { background:#F5F5FF; }
  .item .icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .item .icon.folder { background:#EEF0FF; color:var(--indigo); }
  .item .icon.demo { background:#ECFDF3; color:#12B76A; }
  .item .text { flex:1; min-width:0; }
  .item .name { font-weight:600; font-size:14.5px; }
  .item .desc { font-size:12.5px; color:var(--muted); margin-top:2px; }
  .item .chev { color:#C0C4CC; flex-shrink:0; }
  .badge { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#12B76A; background:#ECFDF3; padding:2px 8px; border-radius:999px; margin-left:8px; }
  .empty { text-align:center; padding:56px 20px; color:var(--muted); }
  .empty .emoji { font-size:34px; margin-bottom:12px; }
  .empty p { margin:0; font-size:14px; }
  .up { display:inline-flex; align-items:center; gap:6px; margin: 14px 0 0; font-size:13px; color:var(--muted); text-decoration:none; }
  .up:hover { color:var(--indigo); }
  footer { text-align:center; padding:26px; color:var(--muted); font-size:12px; }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="breadcrumb"><a href="/">ChangeProposal</a><span class="sep">/</span><span class="current">Student Portal</span></div>
      <h1>Student Portal</h1>
    </div>
  </header>
  <main>
    <div class="empty">
      <div class="emoji">&#128193;</div>
      <p>এখনো কোনো ডেমো যোগ করা হয়নি।</p>
      <a class="up" href="../">&larr; আগের ফোল্ডারে ফিরে যান</a>
    </div>
  </main>
  <footer>ChangeProposal &middot; ERP/Portal Change Proposal</footer>
</body>
</html>
